# ============================================================
# pyproject.toml — SNIPPET (merge into your existing file)
# ============================================================
# This shows the relevant sections for CI/CD. Merge these into
# your actual pyproject.toml.

[project]
name = "genome-annotator"
dynamic = ["version"]
description = "Automated prokaryotic genome annotation pipeline"
requires-python = ">=3.10"
dependencies = [
    "biopython>=1.83",
    "pandas>=2.0",
    "numpy>=1.24",
    "pyhmmer>=0.10",       # Python bindings for HMMER (faster than subprocess)
    "rich>=13.0",          # pretty terminal output
    "click>=8.0",          # CLI framework
]

[project.optional-dependencies]
dev = [
    "ruff",
    "mypy",
    "pre-commit",
    "types-requests",
]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-timeout>=2.2",
    "pytest-xdist>=3.5",   # parallel test execution
]

[project.scripts]
genome-annotator = "genome_annotator.cli:main"

# ── Ruff configuration ───────────────────────────────────────
[tool.ruff]
target-version = "py310"
line-length = 99

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (import sorting)
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific rules
]

[tool.ruff.lint.isort]
known-first-party = ["genome_annotator"]

# ── Mypy configuration ───────────────────────────────────────
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

# ── Pytest configuration ─────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests needing reference databases (deselect with '-m not integration')",
    "slow: marks tests that take >30s",
]
addopts = "-ra --strict-markers"
